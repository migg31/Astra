services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: certifexpert-db
    environment:
      POSTGRES_USER: certifexpert
      POSTGRES_PASSWORD: devpass
      POSTGRES_DB: certifexpert
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/database/migrations:/migrations:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U certifexpert -d certifexpert"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
